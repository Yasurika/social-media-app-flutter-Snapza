name: social_media_app
description: "A social media app like Instagram built with Flutter and Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.3
  image_picker: ^1.1.2
  video_player: ^2.9.2
  cached_network_image: ^3.4.1
  file_picker: ^8.0.0
  path_provider: ^2.0.15
  record: ^3.0.0
  audioplayers: ^6.6.0
  url_launcher: ^6.1.5
  provider: ^6.1.2
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_staggered_grid_view: ^0.7.0
  cloudinary_public: ^0.23.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/Screenshot 2026-03-16 192854.png
